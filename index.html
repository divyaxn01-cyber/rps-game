<script>

let p1, p2;
let s1 = 0, s2 = 0;

let mode = "pvp";
let turn = 1;

let c1 = "", c2 = "";
let computerChoice = "";

function startGame() {

  p1 = document.getElementById("p1").value || "Player 1";
  p2 = document.getElementById("p2").value || "Player 2";

  mode = document.getElementById("mode").value;

  if (mode === "cpu") {
    p2 = "Computer 🤖";
  }

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  document.getElementById("name1").innerText = p1;
  document.getElementById("name2").innerText = p2;

  document.getElementById("turn").innerText = p1 + " Turn";
}

/* 🎮 MAIN PICK FUNCTION */
function pick(choice) {

  // =========================
  // 🤖 CPU MODE (FIXED)
  // =========================
  if (mode === "cpu") {

    c1 = choice;

    const options = ["stone", "paper", "scissors"];
    computerChoice = options[Math.floor(Math.random() * 3)];
    c2 = computerChoice;

    showResult();
    return;
  }

  // =========================
  // 👥 PVP MODE (FIXED)
  // =========================
  if (turn === 1) {
    c1 = choice;
    turn = 2;
    document.getElementById("turn").innerText = p2 + " Turn";
  } else {
    c2 = choice;
    showResult();
  }
}

/* 🧠 RESULT SYSTEM */
function showResult() {

  let result = "";
  let color = "";

  if (c1 === c2) {
    result = "Draw!";
    color = "pink";
  }
  else if (
    (c1 === "stone" && c2 === "scissors") ||
    (c1 === "paper" && c2 === "stone") ||
    (c1 === "scissors" && c2 === "paper")
  ) {
    s1++;
    result = p1 + " Wins!";
    color = "pink";
  } else {
    s2++;
    result = p2 + " Wins!";
    color = "blue";
  }

  document.getElementById("s1").innerText = s1;
  document.getElementById("s2").innerText = s2;

  document.getElementById("card").className = "card " + color;
  document.getElementById("result").innerText = result;

  // show computer only in CPU mode
  if (mode === "cpu") {
    document.getElementById("cpuFinal").innerText =
      "🤖 Computer chose: " + computerChoice;
  } else {
    document.getElementById("cpuFinal").innerText = "";
  }

  document.getElementById("popup").classList.add("show");

  launchConfetti();
}

/* 🔁 NEXT ROUND */
function nextRound() {
  document.getElementById("popup").classList.remove("show");
  turn = 1;
  document.getElementById("turn").innerText = p1 + " Turn";
}

/* 🔄 REMATCH */
function rematch() {
  s1 = 0;
  s2 = 0;
  document.getElementById("s1").innerText = 0;
  document.getElementById("s2").innerText = 0;
  nextRound();
}

/* 🎉 CONFETTI */
function launchConfetti() {
  const colors = ["#ff6fa3","#4da6ff","#ffd166","#06d6a0","#fff"];

  for (let i = 0; i < 50; i++) {
    let c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (Math.random() * 2 + 2) + "s";

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

</script>
