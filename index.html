<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Paper Scissors</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  color: white;
  text-align: center;
}

.game {
  padding: 20px;
  border: 2px solid #444;
  border-radius: 12px;
  width: 300px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.hidden { display: none; }

.popup {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}

.popup.show { display: flex; }

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="game">

  <h2>RPS Game</h2>

  <div id="startScreen">
    <input id="p1" placeholder="Player 1"><br>
    <input id="p2" placeholder="Player 2 (optional)"><br>

    <select id="mode">
      <option value="pvp">PvP</option>
      <option value="cpu">CPU</option>
    </select>

    <button onclick="startGame()">Start</button>
  </div>

  <div id="gameScreen" class="hidden">

    <h3 id="turn"></h3>

    <button onclick="pick('stone')">🪨</button>
    <button onclick="pick('paper')">📄</button>
    <button onclick="pick('scissors')">✂️</button>

    <h4>
      <span id="n1"></span>: <span id="s1">0</span> |
      <span id="n2"></span>: <span id="s2">0</span>
    </h4>

  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="card">
    <h2 id="result"></h2>
    <p id="cpuText"></p>
    <button onclick="nextRound()">Next</button>
  </div>
</div>

<script>

let p1, p2;
let mode = "pvp";
let turn = 1;

let c1 = "", c2 = "";
let s1 = 0, s2 = 0;

let computerChoice = "";

function startGame() {

  p1 = document.getElementById("p1").value || "Player 1";
  p2 = document.getElementById("p2").value || "Player 2";

  mode = document.getElementById("mode").value;

  if (mode === "cpu") p2 = "Computer 🤖";

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  document.getElementById("n1").innerText = p1;
  document.getElementById("n2").innerText = p2;

  document.getElementById("turn").innerText = p1 + " Turn";
}

function pick(choice) {

  c1 = choice;

  if (mode === "cpu") {

    const options = ["stone", "paper", "scissors"];
    computerChoice = options[Math.floor(Math.random() * 3)];

    c2 = computerChoice;
    showResult();
    return;
  }

  if (turn === 1) {
    c1 = choice;
    turn = 2;
    document.getElementById("turn").innerText = p2 + " Turn";
  } else {
    c2 = choice;
    showResult();
  }
}

function showResult() {

  let result = "";

  if (c1 === c2) {
    result = "Draw";
  }
  else if (
    (c1 === "stone" && c2 === "scissors") ||
    (c1 === "paper" && c2 === "stone") ||
    (c1 === "scissors" && c2 === "paper")
  ) {
    s1++;
    result = p1 + " Wins";
  } else {
    s2++;
    result = p2 + " Wins";
  }

  document.getElementById("s1").innerText = s1;
  document.getElementById("s2").innerText = s2;

  document.getElementById("result").innerText = result;

  if (mode === "cpu") {
    document.getElementById("cpuText").innerText =
      "Computer chose: " + computerChoice;
  } else {
    document.getElementById("cpuText").innerText = "";
  }

  document.getElementById("popup").classList.add("show");
}

function nextRound() {
  document.getElementById("popup").classList.remove("show");
  turn = 1;
  document.getElementById("turn").innerText = p1 + " Turn";
}

</script>

</body>
</html>
